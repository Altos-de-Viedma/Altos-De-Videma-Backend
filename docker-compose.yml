version: '3.8'

services:
  # PostgreSQL Database (for local development)
  db:
    image: postgres:14.4
    restart: always
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-altosdeviedma}
    container_name: altosdeviedma-db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - NODE_ENV=${STAGE:-dev}
      - STAGE=${STAGE:-dev}
      - PORT=3001
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-altosdeviedma}
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key-change-in-production}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-1d}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./public:/app/public
    restart: unless-stopped

volumes:
  postgres_data: